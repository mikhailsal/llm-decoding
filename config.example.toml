# Decoding Sandbox -- example configuration.
#
# Copy this to `config.toml` (gitignored) and adjust. Anything you omit falls
# back to these defaults. API keys are NEVER stored here -- only the NAME of the
# environment variable that holds each key (see [providers.*].api_key_env).
#
# Keys currently live in ~/.config/dsbx/secrets.env. Point `secrets_env_file`
# at it (or export the vars yourself) so the CLI can read them.

# Optional dotenv-style file the CLI will load before reading api_key_env vars.
secrets_env_file = "~/.config/dsbx/secrets.env"

[run]
# Default backend used when --backend is not passed.
# One of:
#   hf | llamacpp | llamacpp-py     -- in-process (heavy; run on dsbx-host)
#   <NAME>                          -- any [remote.NAME] entry below
#   fireworks | nim | openrouter | lmstudio  -- cloud / local OpenAI compat
#
# On the client with a server on dsbx-host, the typical value is the name of
# the [remote.NAME] alias, e.g. "dsbx-host-py".
backend = "llamacpp"

[storage]
# Where bulk caches go. On dsbx-host this is the large local SSD (L:), which has room
# and is NOT R: (unreliable) or S: (HDD). On the client these are ignored
# unless the paths exist.
hf_home = "~/.cache/dsbx/huggingface"
pip_cache = "~/.cache/dsbx/pip"
# Preflight aborts before heavy work if free space on any check path drops
# below this many GB (protects C: where the Linux .img lives).
min_free_gb = 5.0
# Paths whose free space is checked by `dsbx doctor` / preflight.
check_paths = ["/", "~/.cache/dsbx", "~"]

# ---- Local engines (run on dsbx-host) -------------------------------------------

[local.llamacpp]
# llama-server endpoint (built with CUDA on dsbx-host, see scripts/setup_wind.sh).
base_url = "http://127.0.0.1:8080"
# Label only; the actual model is whatever llama-server was launched with.
model = "Qwen3.5-9B-Base-Q4_K_M"

[local.llamacpp_py]
# IN-PROCESS llama.cpp via the `llama-cpp-python` binding. Same GGUF as the
# HTTP backend, but with `logits_all=true` we expose the FULL [seq, vocab]
# tensor -- the true white-box engine for the 9B base, which the HF backend
# can't load on the 6 GB Pascal (bitsandbytes/accelerate meta-tensor bug on
# the hybrid arch). Build with CUDA on dsbx-host:
#   CMAKE_ARGS="-DGGML_CUDA=on -DCMAKE_CUDA_ARCHITECTURES=61 \
#               -DCMAKE_CUDA_HOST_COMPILER=/usr/bin/g++-12" \
#       pip install llama-cpp-python --no-binary=:all:
# If `model_path` is unset, the backend searches `model_search_dirs` for the
# first file matching `model_glob` (the GGUF already downloaded by the
# HTTP backend's setup script).
# model_path = "/path/to/Qwen3.5-9B-Base-Q4_K_M.gguf"
model_glob = "**/Qwen3.5-9B-Base-Q4_K_M.gguf"
model_search_dirs = ["~/.cache/dsbx/huggingface", "~/.cache/huggingface"]
n_gpu_layers = 20
n_ctx = 4096
logits_all = true
verbose = false

[local.hf]
# HuggingFace transformers white-box engine (full-vocab logits).
#
# NOTE: the 9B base (Qwen/Qwen3.5-9B-Base) does NOT load cleanly in 4-bit on the
# 6 GB Pascal P40 -- its hybrid/multimodal arch + bitsandbytes CPU offload hits
# accelerate meta-tensor bugs (verified). So the white-box engine defaults to a
# dense base that fits fully in VRAM, and the 9B base is served by llama.cpp.
# You can still try the 9B here with --model Qwen/Qwen3.5-9B-Base (slow, may fail).
model = "Qwen/Qwen3-1.7B-Base"
load_in_4bit = true
device_map = "auto"
# Fallback if the chosen model fails to load.
fallback_model = "Qwen/Qwen3-1.7B-Base"
# `device_map="auto"` memory caps passed as `max_memory`. Tuned for the 6 GB
# P40 on dsbx-host (4500MiB GPU + 13 GiB CPU offload). Bump GPU if you have more
# VRAM and want to avoid CPU offload.
gpu_mem = "4500MiB"
cpu_mem = "13GiB"

# ---- Remote dsbx servers (one per [remote.NAME] block) ---------------------
#
# A remote server is a ``dsbx serve`` instance on another host that holds
# one heavy backend in memory. The client's TUI connects to it over
# HTTP/SSE instead of loading the model itself. Name each entry whatever
# is convenient; use the name as ``--backend NAME`` (or in
# ``[run].backend``).
#
# Typical dsbx-host setup -- one server per backend, different ports:
#
#   [remote.dsbx-host-py]
#   base_url = "http://192.0.2.42:8000"
#
#   [remote.dsbx-host-hf]
#   base_url = "http://192.0.2.42:8001"
#
# The ``remote`` name alone also works when exactly one entry is
# configured; with more than one, pass the explicit alias.

# [remote.dsbx-host-py]
# base_url = "http://127.0.0.1:8000"
# timeout = 120.0

# ---- Cloud providers (logprob-capable, live-verified) ----------------------

[providers.fireworks]
base_url = "https://api.fireworks.ai/inference/v1"
api_key_env = "FIREWORKS_API_KEY"
default_model = "accounts/fireworks/models/gpt-oss-120b"
# Fireworks supports top_logprobs <= 5 and whole-context prompt logprobs (echo).
max_top_logprobs = 5
supports_prompt_logprobs = true
has_completions = true

[providers.nim]
base_url = "https://integrate.api.nvidia.com/v1"
api_key_env = "NVIDIA_API_KEY"
default_model = "meta/llama-3.1-8b-instruct"
max_top_logprobs = 20
supports_prompt_logprobs = false
has_completions = false

[providers.openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
default_model = "meta-llama/llama-3.1-8b-instruct"
max_top_logprobs = 20
supports_prompt_logprobs = false
# Required so OpenRouter only routes to providers that actually honor logprobs.
require_parameters = true
has_completions = false

[providers.lmstudio]
# LM Studio's local OpenAI-compatible server (Windows). Start it in LM Studio.
base_url = "http://127.0.0.1:1234/v1"
api_key_env = "LMSTUDIO_API_KEY"
default_model = "local-model"
max_top_logprobs = 10
supports_prompt_logprobs = false
has_completions = true

# Gemini AI Studio is intentionally absent: logprobs is disabled there
# (capability gate, verified live). Use Vertex AI + billing if ever needed.
