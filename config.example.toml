# Decoding Sandbox -- example configuration.
#
# Copy this to `config.toml` (gitignored) and adjust. Anything you omit falls
# back to these defaults. API keys are NEVER stored here -- only the NAME of the
# environment variable that holds each key (see [providers.*].api_key_env).
#
# Keys currently live in ~/.config/dsbx/secrets.env. Point `secrets_env_file`
# at it (or export the vars yourself) so the CLI can read them.

# Optional dotenv-style file the CLI will load before reading api_key_env vars.
secrets_env_file = "~/.config/dsbx/secrets.env"

[run]
# Default backend used when --backend is not passed.
# One of:
#   hf | llamacpp | llamacpp-py     -- in-process (heavy; run on dsbx-host)
#   <NAME>                          -- any [remote.NAME] entry below
#   fireworks | nim | openrouter | lmstudio  -- cloud / local OpenAI compat
#
# On the client with a server on dsbx-host, the typical value is the name of
# the [remote.NAME] alias, e.g. "dsbx-host-py".
backend = "llamacpp"

[storage]
# Where bulk caches go. On dsbx-host this is the large local SSD (L:), which has room
# and is NOT R: (unreliable) or S: (HDD). On the client these are ignored
# unless the paths exist.
hf_home = "~/.cache/dsbx/huggingface"
pip_cache = "~/.cache/dsbx/pip"
# Preflight aborts before heavy work if free space on any check path drops
# below this many GB (protects C: where the Linux .img lives).
min_free_gb = 5.0
# Paths whose free space is checked by `dsbx doctor` / preflight.
check_paths = ["/", "~/.cache/dsbx", "~"]

# ---- Local engines (run on dsbx-host) -------------------------------------------

[local.llamacpp]
# llama-server endpoint (built with CUDA on dsbx-host, see scripts/setup_wind.sh).
base_url = "http://127.0.0.1:8080"
# Label only; the actual model is whatever llama-server was launched with.
model = "Qwen3.5-9B-Base-Q4_K_M"

[local.llamacpp_py]
# IN-PROCESS llama.cpp via the `llama-cpp-python` binding. Same GGUF as the
# HTTP backend, but with `logits_all=true` we expose the FULL [seq, vocab]
# tensor -- the true white-box engine for the 9B base, which the HF backend
# can't load on the 6 GB Pascal (bitsandbytes/accelerate meta-tensor bug on
# the hybrid arch). Build with CUDA on dsbx-host:
#   CMAKE_ARGS="-DGGML_CUDA=on -DCMAKE_CUDA_ARCHITECTURES=61 \
#               -DCMAKE_CUDA_HOST_COMPILER=/usr/bin/g++-12" \
#       pip install llama-cpp-python --no-binary=:all:
# If `model_path` is unset, the backend searches `model_search_dirs` for the
# first file matching `model_glob` (the GGUF already downloaded by the
# HTTP backend's setup script).
# model_path = "/path/to/Qwen3.5-9B-Base-Q4_K_M.gguf"
model_glob = "**/Qwen3.5-9B-Base-Q4_K_M.gguf"
model_search_dirs = ["~/.cache/dsbx/huggingface", "~/.cache/huggingface"]
n_gpu_layers = 20
n_ctx = 4096
logits_all = true
verbose = false

[local.hf]
# HuggingFace transformers white-box engine (full-vocab logits).
#
# NOTE: the 9B base (Qwen/Qwen3.5-9B-Base) does NOT load cleanly in 4-bit on the
# 6 GB Pascal P40 -- its hybrid/multimodal arch + bitsandbytes CPU offload hits
# accelerate meta-tensor bugs (verified). So the white-box engine defaults to a
# dense base that fits fully in VRAM, and the 9B base is served by llama.cpp.
# You can still try the 9B here with --model Qwen/Qwen3.5-9B-Base (slow, may fail).
model = "Qwen/Qwen3-1.7B-Base"
load_in_4bit = true
device_map = "auto"
# Fallback if the chosen model fails to load.
fallback_model = "Qwen/Qwen3-1.7B-Base"
# `device_map="auto"` memory caps passed as `max_memory`. Tuned for the 6 GB
# P40 on dsbx-host (4500MiB GPU + 13 GiB CPU offload). Bump GPU if you have more
# VRAM and want to avoid CPU offload.
gpu_mem = "4500MiB"
cpu_mem = "13GiB"

# ---- Remote dsbx servers (one per [remote.NAME] block) ---------------------
#
# A remote server is a ``dsbx serve`` instance on another host that holds
# one heavy backend in memory. The client's TUI connects to it over
# HTTP/SSE instead of loading the model itself. Name each entry whatever
# is convenient; use the name as ``--backend NAME`` (or in
# ``[run].backend``).
#
# Typical dsbx-host setup -- one server per backend, different ports:
#
#   [remote.dsbx-host-py]
#   base_url = "http://192.0.2.42:8000"
#
#   [remote.dsbx-host-hf]
#   base_url = "http://192.0.2.42:8001"
#
# The ``remote`` name alone also works when exactly one entry is
# configured; with more than one, pass the explicit alias.

# [remote.dsbx-host-py]
# base_url = "http://127.0.0.1:8000"
# timeout = 120.0

# ---- Cloud providers (logprob-capable, live-verified) ----------------------

[providers.fireworks]
base_url = "https://api.fireworks.ai/inference/v1"
api_key_env = "FIREWORKS_API_KEY"
default_model = "accounts/fireworks/models/gpt-oss-120b"
# Fireworks supports top_logprobs <= 5 and whole-context prompt logprobs (echo).
max_top_logprobs = 5
supports_prompt_logprobs = true
has_completions = true
# Provider-specific /v1/completions extensions, see
# https://docs.fireworks.ai/api-reference/post-completions . We turn them
# ALL on for Fireworks because the educational sandbox UX is "show me
# everything the model knows about this step" -- and the cost of an
# unused field is negligible. Each flag gates one bit of behaviour in
# decoding_sandbox/backends/openai_compat.py + the matching UI panel.
supports_ignore_eos = true             # respect_eos = false actually works
supports_perf_metrics = true           # server-side timings panel (TTFT, prefill, ...)
supports_raw_output = true             # prompt_fragments, real token_ids, grammar
supports_sampling_mask = true          # "N tokens passed top_p/top_k/min_p" per step
supports_return_token_ids = true       # real token ids in candidates (no synthetic interning)
supports_echo_last = true              # cheap echo for long prompts
supports_mirostat = true               # adaptive perplexity-targeting sampler
supports_typical_p_native = true       # typical_p server-side instead of per-step
supports_repetition_penalty = true     # Fireworks-extension penalty
supports_prompt_cache_key = true       # stable KV-cache routing for manual sessions
supports_service_tier = true           # service_tier: priority (etc.)
supports_session_affinity = true       # x-session-affinity + MoE Router Replay (R3)
supports_new_logprobs = true           # logprobs:true + top_logprobs:N (NewLogProbs)
supports_logit_bias = true             # per-request token-id bias map [-100..100]
supports_combined_echo_stream = true   # echo+stream in one request (Phase 5)

# Curated list of models known to be deployed on serverless inference
# today. Fireworks rotates serverless availability every few weeks, so
# treat this as a starting set -- the UI also unions in whatever the
# live /v1/accounts/fireworks/models endpoint returns at runtime. Models
# not on serverless return 404 on /completions even if "READY" in the
# catalogue. Add new entries by probing first (one POST with prompt="hi",
# max_tokens=1, expect 200).
models = [
  "accounts/fireworks/models/gpt-oss-120b",
  "accounts/fireworks/models/gpt-oss-20b",
  "accounts/fireworks/models/glm-5p1",
  "accounts/fireworks/models/glm-5p2",
  "accounts/fireworks/models/deepseek-v4-flash",
]

# Per-model HuggingFace repo that ships the matching ``tokenizer.json``.
# Fetched on first use via ``hf_hub_download`` and cached in
# ~/.cache/huggingface/hub. Drives three features:
#   * token-array prompt mode (splice extra ids in front of the prompt, so
#     the "fill BOS" workflow works on cloud backends too);
#   * live token preview as the user types in the Decode workbench;
#   * auto-discovery of bos_token_ids (no per-model hardcoding).
# All defaults below are public on the HuggingFace Hub; gated repos
# (Llama family) still work if ``HF_TOKEN`` is configured with access --
# drop the token into a project-local ``.env`` and ``load_config`` picks
# it up. Missing entries gracefully degrade to "no local tokenizer for
# this model" and the UI dims the prepend chip-input + live preview.
[providers.fireworks.tokenizers]
"accounts/fireworks/models/gpt-oss-120b" = "openai/gpt-oss-120b"
"accounts/fireworks/models/gpt-oss-20b" = "openai/gpt-oss-20b"
"accounts/fireworks/models/glm-5p1" = "zai-org/GLM-5"
"accounts/fireworks/models/glm-5p2" = "zai-org/GLM-5"
"accounts/fireworks/models/deepseek-v4-flash" = "deepseek-ai/DeepSeek-V4-Flash"

# Per-model overrides of provider-level ``supports_*`` flags. Fireworks's
# serverless contract is NOT uniform: gpt-oss-120b accepts the
# NewLogProbs ``sampling_mask: "count"`` extension, gpt-oss-20b rejects
# it with HTTP 400 ("Extra inputs are not permitted, field:
# 'sampling_mask'"). The OpenAI-compat backend's ``_provider_flag(name)``
# helper consults this table first, then falls back to the provider-
# level attribute, so a future divergence is a one-line config tweak
# instead of a code patch. The override key is the FULL model id
# (matches the value sent on the wire).
[providers.fireworks.model_overrides."accounts/fireworks/models/gpt-oss-20b"]
supports_sampling_mask = false

# WARNING -- chat-only provider. Currently REGISTERED but INERT: the
# decoding workbench refuses to generate / inspect / manual-decode against
# these because the per-step "growing user message" emulation we used to
# run on chat-only providers (re-sending ``detokenize(prompt + emitted_so_far)``
# as a fresh user message on every step) was misleading-by-design -- the
# displayed "continuation" was N independent first-responses rather than a
# real continuation. Re-enable when proper chat-mode UI lands (system /
# user / assistant turns, no per-step inspection inside an assistant turn).
# See plan: Unify Decode Workbench, Phase 0. The block is left here as a
# reference so re-enabling later is a one-line config change.
[providers.nim]
base_url = "https://integrate.api.nvidia.com/v1"
api_key_env = "NVIDIA_API_KEY"
default_model = "meta/llama-3.1-8b-instruct"
max_top_logprobs = 20
supports_prompt_logprobs = false
has_completions = false

# WARNING -- chat-only provider. See the [providers.nim] banner above for
# the rationale and the re-enable path; identical caveats apply.
[providers.openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
default_model = "meta-llama/llama-3.1-8b-instruct"
max_top_logprobs = 20
supports_prompt_logprobs = false
# Required so OpenRouter only routes to providers that actually honor logprobs.
require_parameters = true
has_completions = false

[providers.lmstudio]
# LM Studio's local OpenAI-compatible server (Windows). Start it in LM Studio.
base_url = "http://127.0.0.1:1234/v1"
api_key_env = "LMSTUDIO_API_KEY"
default_model = "local-model"
max_top_logprobs = 10
supports_prompt_logprobs = false
has_completions = true

# Gemini AI Studio is intentionally absent: logprobs is disabled there
# (capability gate, verified live). Use Vertex AI + billing if ever needed.

# ---- Web middleware (browser <-> dsbx) -------------------------------------
#
# The ``dsbx web`` middleware fronts every configured backend behind a single
# bearer-token API so the browser never sees provider keys or the dsbx-host LAN
# address. Install the extra on the host that runs the middleware:
#
#   pip install -e ".[web]"
#
# Then run it:
#
#   export DSBX_WEB_TOKEN="$(openssl rand -hex 32)"
#   dsbx web --host 127.0.0.1 --port 8765 --frontend-dist frontend/build

[web]
# Bearer token the browser must send. The CLI flag --token and the
# environment variable DSBX_WEB_TOKEN both override this. Treat it like an
# API key (rotate freely; gitignored config.toml is the right place for it).
api_token = "change-me-please-use-a-long-random-string"
# Origins allowed by CORS. The SvelteKit dev server defaults to 5173; when
# you serve the built bundle from this same process you don't need an entry
# here at all (same-origin).
cors_origins = ["http://localhost:5173"]
# How long an idle manual-decoding session lives on the middleware before it
# gets evicted (seconds). 1h is a reasonable default for a single-user box.
manual_session_ttl = 3600

# Upstream-request logging: every outgoing HTTP call the middleware makes
# (RemoteBackend -> dsbx-host, OpenAICompatBackend -> Fireworks/NIM/..., HTTP
# llama-server) is captured and persisted to a SQLite file. The frontend's
# ``/logs`` tab reads from this DB. Set ``enabled = false`` to opt out
# entirely; the rest of the keys are tunables.
[web.logging]
enabled = true
# Where the SQLite file lives. ``~`` and environment variables are expanded.
# The parent directory is created on first write.
db_path = "~/.local/share/dsbx/logs.db"
# Background-flush knobs. The writer wakes up either when ``batch_size`` rows
# have piled up or after ``flush_interval_seconds`` of quiet, whichever comes
# first. SQLite is local so even sustained 10 RPS finishes a batch well
# under a second.
batch_size = 50
flush_interval_seconds = 5.0
